              example:
                issuer: https://api-nomatls.apicentre.middleware.co.nz/
                authorization_endpoint: >-
                  https://api-nomatls.apicentre.middleware.co.nz/oauth/v2.0/authorize
                token_endpoint: >-
                  https://api-nomatls.apicentre.middleware.co.nz/oauth/v2.0/token
                introspection_endpoint: >-
