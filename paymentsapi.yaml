        - The OpenID Connect standard requires most errors be returned in the
        location header. Check the header (or console) for details of any error
        responses.

        - The most likely cause of errors is that preconditions have not been
        met.

        - Another likely cause is that you haven't disabled the 'Automatically
        follow redirects' setting in Postman as described in the introductory
        documentation for this postman collection.
            
        - Another likely cause of errors is that the environment variables are
        not properly set.
            
        - Another possible cause of errors are out of date variable values.
        Create another consent and try again.
            
        - Another source of errors could be any changes you might have made to
        other variable values.

