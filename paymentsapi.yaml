                  - PS512
                backchannel_authentication_request_signing_alg_values_supported:
                  - PS512
      tags:
        - 01 - OIDC Discovery
      description: >+
        This is the first step in interacting with an API Provider.


        This request retrieves a set of metadata which provides the Third Party
        with configuration details about the API Provider's OpenID Provider /
        Authorization Server (AS), such as the location of the /authorize
        endpoint or whether or not optional features in the Security Profile are
        supported by the API Provider.


        PNZ API Centre: For some versions of the [PNZ API Centre Security
        Profile](https://paymentsnz.atlassian.net/wiki/spaces/PaymentsNZAPIStandards/pages/1680441658/Security+Profile),
        such as
        [v3.0.0](https://paymentsnz.atlassian.net/wiki/spaces/PaymentsNZAPIStandards/pages/1680479247/Authorization+Server+Metadata+v3.0.0),
        a detailed definition of the Authorization Server Metadata is available.

