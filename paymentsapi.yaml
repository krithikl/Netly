                jwks_uri: https://api-nomatls.apicentre.middleware.co.nz/oauth/v2.0/keys
                userinfo_endpoint: >-
                  https://api-nomatls.apicentre.middleware.co.nz/oauth/v2.0/userinfo
                pushed_authorization_request_endpoint: https://api-nomatls.apicentre.middleware.co.nz/oauth/v2.0/par
