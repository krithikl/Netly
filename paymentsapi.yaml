      responses: {}
      tags:
        - 05 - OIDC Authorization and Authentication
        - 05.1 - Hybrid Flow
      description: >-
        This request is following the redirect which was returned from the
        previous GET /authorize request. The redirect is to the API Provider's
        login page. In the browser, this redirect happens automatically, and
        your application won't need to worry about this. However, in Postman, we
        must explicitly follow the redirect because we want to proceed to the
        login page.


        **Preconditions**


        - 05.1.1 - Submit Authorization Request
            

        **Troubleshooting**:


        - The most likely cause of errors is that preconditions have not been
        met.

        - Another likely cause of errors are out of date variable values. Create
        another consent and try the Hybrid Flow again from the beginning.

        - Another source of errors could be any changes you might have made to
        other variable values.
    post:
      summary: 05.1.3 - Customer Login
      responses: {}
      tags:
        - 05 - OIDC Authorization and Authentication
        - 05.1 - Hybrid Flow
      description: >-
        This request mimics the user authenticating at the model API Provider.
        Your application doesn't need to worry about this step because it is the
        responsiblity of the API Provider.


        **Preconditions**


        - `05.1.2 - Follow Authorize Redirect to Login Page`

        - `e_username` must be set to one of the usernames returned from `03.1 -
        Get Customers and Accounts` (e.g. "user02" or "user01")

        - `e_password` must be set to "password"
            

        **Troubleshooting**:


        - The most likely cause of errors is that preconditions have not been
        met.

        - Another likely cause of errors are out of date variable values. Create
        another consent and try the Hybrid Flow again from the beginning.

        - Another source of errors could be any changes you might have made to
        other variable values.
