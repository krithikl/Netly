  /middleware-nz-sandbox/v2.0/data/mutation/reject-ciba-consent/{AuthRequestId}:
    put:
      summary: 10.1.2 - Reject Authorization Request (Decoupled)
      responses: {}
      tags:
        - 10 - Sandbox APIs
        - 10.1 - Manage Authorization
      security:
        - BearerAuth: []
      description: >-
        This step mimics the user approving the consent via the API Provider's
        decoupled consent journey.


        If the consent is an account-access-consents then all accounts are
        selected.


        If the consent is one of the payment-consents then only the first
        account is selected.


        **Preconditions**


        - 05.2.1 - Submit Backchannel Authorization Request
            

        **Troubleshooting**:


        - The most likely cause of errors is that preconditions have not been
        met.

        - Another likely cause of errors are out of date variable values. Create
        another consent and try again.

        - Another source of errors could be any changes you might have made to
        other variable values.
    parameters:
      - name: AuthRequestId
        in: path
        required: true
        schema:
          type: string
        example: '{{t_authReqId}}'
