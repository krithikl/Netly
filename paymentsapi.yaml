openapi: 3.0.0
info:
  title: PNZ API Centre Sandbox
  version: 1.0.0
  description: >-
    API Centre Sandbox Postman Collection Version: 2.8.0


    This Postman collection is designed to support your development against the
    [Payments NZ API Centre
    sandbox](https://developer.apicentre.middleware.co.nz). The sandbox, powered
    by [Glueware](https://glueware.co.nz), is a dedicated environment that
    mimics an API Provider, as defined in the [Payments NZ API Centre
    standards](https://paymentsnz.atlassian.net/wiki/spaces/PaymentsNZAPIStandards/overview).


    ## Getting Started


    Before you run any Sandbox requests, you will need to do the following:


    1. Register an application in the
    [Sandbox](https://developer.apicentre.middleware.co.nz/)
        
    2. Set or update the following variables in the collection to reflect this
    registered application:
        
        1. `e_clientId` - The client ID assigned when you registered your client application on the Sandbox Developer Portal. The collection assumes this client has scopes `openid accounts payments` and account access consents permissions (e.g. `ReadOffers`, `ReadScheduledPaymentsBasic`, etc.).
            
        2. `e_thirdPartyRedirectUri` - One of the callback URIs registered for your client application. Example: `http://localhost`
            
        3. `e_clientKid` - The key ID (KID) for the public key.
            
        4. `e_clientPrivateKey` - The private key associated with the public key. (Single line format, no newline/escape characters.) Example: `-----BEGIN RSA PRIVATE KEY-----MIIEpA...5KTA==-----END RSA PRIVATE KEY-----`
            
        5. `e_apiVersion` - The PNZ API Centre Standards version you wish to use. Example: `v2.3`
            
        6. Note: There are many other variables defined in the collection, but these should already be set-up for the Sandbox or will be set to appropriate values as you run through the collection.
            
    3. Test your setup by sending the following requests:
        
        1. `01.1 - Well-Known OpenID Configuration` to confirm connectivity with the sandbox endpoints.
            
        2. `03.1 - Get Customers and Accounts` to confirm your keys are set up correctly. (Most failures at this stage are likely due to a mismatch between what is configured in Postman and what is registered on the Sandbox, or invalid signing keys)
            
    4. Review the response from `03.1 - Get Customers and Accounts` as this is
    your set of customers and their accounts for you to use when testing with
    the sandbox. These customers and accounts are not shared with any other
    applications.
        

    ## Folders


    The collection includes a number of folders.


    Folders beginning with `OIDC` include endpoints that are defined in the Open
    ID Connect suite of standards, on which the PNZ API Centre Security Profile
    is based.


    Folders beginning with `PNZ` include endpoints defined in the PNZ API Centre
    NZ Banking Data API specification, as well as the Account Information,
    Payment Initiation and Event Notification APIs.


    Folders beginning with `Sandbox` include endpoints that are NOT defined in
    the PNZ API Centre standards. They are utilities for Third Parties to
    retrieve and manipulate their test data in the sandbox.


    ## Variables


    The collection uses three types of variables - collection variables,
    environment variables and temporary variables. Collection variables are URLs
    or constants that you should never change. The environment variables are the
    variables you can personalise for your application. The temporary variables
    are created as you step through the requests and are cleaned up using the
    request in the Collection Utilities folder.


    Naming conventions for variables are as follows:


    `x_variableName`


    Where x is one of


    - `c` indicates the variable is a collection variable. You should not have
    to change these values.
        
    - `e` indicates the variable is an environment variable. You should set
    these values for your local instance of postman.
        
    - `t` indicates the variable is a temporary variable. These values will be
    set as you run through the collection.
        

    e.g.`c_host`, `e_clientId`, `t_clientCredentialsAccessToken`


    To view the current state of a temporary or environment variable, click on
    the environment quick look button. To view the current state of a collection
    variable, edit the collection and click on the Variables tab.


    ## Getting Help


    This collection is provided by Middleware New Zealand (MWNZ), the provider
    of the Payments NZ API Centre Sandbox. If you have any questions or issues,
    please contact us at
    [apicentre@middleware.co.nz](https://mailto:apicentre@middleware.co.nz).
servers:
  - url: https://api-nomatls.apicentre.middleware.co.nz
  - url: https://obep-sandbox.glueware.dev
  - url: '{{t_loginAppLocation}}'
  - url: '{{t_loginApp}}'
paths:
  /.well-known/openid-configuration:
    get:
      summary: 01.1 - Well-Known OpenID Configuration
      responses:
        '200':
          description: Example
          headers:
            x-fapi-interaction-id:
              schema:
                type: string
              example: e3a36807-0cc7-4e9c-a002-eb16b2674055
            Content-Length:
              schema:
                type: integer
              example: 2133
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                    format: uri
                  authorization_endpoint:
                    type: string
                    format: uri
                  token_endpoint:
                    type: string
                    format: uri
                  introspection_endpoint:
                    type: string
                    format: uri
                  revocation_endpoint:
