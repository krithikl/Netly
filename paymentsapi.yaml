  /middleware-nz-sandbox/v2.0/data/info/customers:
    get:
      summary: 03.1 - Get Customers and Accounts
      responses: {}
      tags:
        - 03 - Sandbox Users and Accounts
      security:
        - BearerAuth: []
      description: >-
        Gets the complete list of Users, Customers, Accounts and other metadata
        required for authenticating to the Sandbox.


        The metadata returned by this endpoint will be used to generate login
        hint tokens, authenticate as a mock customer, and account IDs that can
        be associated with an authorised consent.


        This pre-request script of this Postman request will initiate a signing
        library, which is used for signing a client assertion JWT that will
        authenticate this request and the Third Party application against the
        authorization server


        (See also [Section 9 of
        OIDC](https://openid.net/specs/openid-connect-core-1_0.html) regarding
        `private_key_jwt` client authentication)


        The pre-request script will then make an API request to the
        `/oauth/v2.0/token` endpoint to retrieve an access token that will be
        used to authenticate to the
        `/middleware-nz-sandbox/v2.0/data/info/customers` API.


        The `/middleware-nz-sandbox/v2.0/data/info/customers`, and other Sandbox
        APIs, will all be equally protected by this `private_key_jwt`
        authenticated API security mechanism.


        For more breakdown of the logic behind this authentication mechanism,
        view the pre-request script of `04.1.1 - Retrieve Client Credentials
        Token`
  /oauth/v2.0/token:
    post:
      summary: 04.1.1 - Retrieve Client Credentials Token
      responses:
        '200':
          description: Example
          headers:
            x-fapi-interaction-id:
              schema:
                type: string
              example: 70c51e04-ab14-46a9-b732-d05ce1d890c1
            Content-Length:
              schema:
                type: integer
              example: 123
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  access_token:
                    type: string
              example:
                token_type: Bearer
                expires_in: 3599
                access_token: >-
                  ac736e21bbb8432d9743627f2651672cf9046f4c3cb94d60960f90a792b5fdf3
      tags:
        - 04 - PNZ Consents
        - 04.1 - Create Consent
      description: >+
        This request allows a Third Party to obtain an access token using the
        client credentials grant.


        The pre-request script creates the variable `t_clientAssertionJwt`,
        which is sent in the request body.


        **Preconditions**:


        This request relies on `e_clientId`, `e_clientPrivateKey`and
        `e_clientKid`variables being defined correctly in the collection or
        environment.


        **Troubleshooting**:


        - The most likely cause of errors is incorrect variable values. Confirm
        the precondition variable values are correct and consistent with what is
        registered in the Sandbox.

        - Another cause of errors might be a mismatch between the scopes - this
        request assumes your application has been registered for all scopes
        (e.g. openid accounts payments).
            
        - Another source of errors could be any changes you might have made to
        other variable values.

